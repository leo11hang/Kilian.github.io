<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 150 }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  {% seo %}
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16"><path d="M8 1L10.5 6H15L11 9.5L12.5 15L8 12L3.5 15L5 9.5L1 6H5.5L8 1Z"/></svg>
      </div>
      {{ site.title }}
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a>
      <a href="{{ '/tutorial/' | relative_url }}" {% if page.url contains 'tutorial' %}class="active"{% endif %}>AI教程</a>
      <a href="{{ '/download/' | relative_url }}" {% if page.url contains 'download' %}class="active"{% endif %}>软件下载</a>
      <a href="{{ '/activation/' | relative_url }}" {% if page.url contains 'activation' %}class="active"{% endif %}>激活教程</a>
      <a href="{{ '/faq/' | relative_url }}" {% if page.url contains 'faq' %}class="active"{% endif %}>常见问题</a>
      <a href="{{ '/search/' | relative_url }}" {% if page.url contains 'search' %}class="active"{% endif %} class="nav-search-link">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px;"><circle cx="8.5" cy="8.5" r="6"/><path d="M15 15l-3.5-3.5"/></svg>搜索
      </a>
    </nav>
    <a class="btn-email" href="mailto:kkluv2022@outlook.com">
      <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
      kkluv2022@outlook.com
    </a>
  </div>
</header>

{{ content }}

<a class="float-cta" href="{{ site.activation_site }}" target="_blank" rel="noopener">
  <div class="float-cta-dot"></div>
  <span class="float-cta-text">🔑 购买激活码</span>
</a>

<footer class="site-footer">
  <p>© {{ 'now' | date: "%Y" }} {{ site.title }} &nbsp;·&nbsp; 专注 AI 软件教程与激活指南 &nbsp;·&nbsp; <a href="{{ site.activation_site }}" target="_blank">{{ site.activation_text }}</a></p>
</footer>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
      }
    });
  }
</script>
</body>
</html>
