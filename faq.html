---
layout: default
title: "常见问题"
permalink: /faq/
---

<div class="container" style="padding-top:40px;">
  <div class="breadcrumb">
    <a href="{{ '/' | relative_url }}">首页</a>
    <span class="breadcrumb-sep">/</span>
    <span style="color:var(--text-secondary);">常见问题</span>
  </div>
  <h1 style="font-size:24px;font-weight:800;margin-bottom:28px;">❓ 常见问题</h1>
  {% assign posts = site.categories.faq %}
  {% if posts.size > 0 %}
  <div class="posts-grid">
    {% for post in posts %}{% include post-card.html post=post %}{% endfor %}
  </div>
  {% else %}
  <div class="empty-state">
    <div class="empty-icon">❓</div>
    <h2>暂无内容</h2>
    <p>该分类下还没有文章，敬请期待～</p>
    <a href="{{ '/' | relative_url }}" class="empty-btn">← 返回首页</a>
  </div>
  {% endif %}
</div>
